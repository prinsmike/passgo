name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          platforms="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for platform in $platforms; do
            GOOS=${platform%/*}
            GOARCH=${platform#*/}
            bin=passgo
            [ "$GOOS" = windows ] && bin=passgo.exe
            echo "Building ${GOOS}/${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags="-s -w" -o "dist/$bin" ./cmd/passgo
            archive="passgo_${VERSION}_${GOOS}_${GOARCH}"
            if [ "$GOOS" = windows ]; then
              (cd dist && zip -q "${archive}.zip" "$bin" && rm "$bin")
            else
              (cd dist && tar -czf "${archive}.tar.gz" "$bin" && rm "$bin")
            fi
          done
          (cd dist && sha256sum * > SHA256SUMS.txt)
          ls -la dist

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          num=${VERSION#v}
          file="$(mktemp)"
          # Print the body of the "## [<version>]" section, stopping at the next section.
          awk -v ver="$num" '
            $0 ~ "^## \\[" ver "\\]"     { flag=1; next }
            flag && /^## \[/             { exit }
            flag && /^\[[^][]+\]:[ \t]/  { exit }
            flag                        { print }
          ' CHANGELOG.md | sed -e '/./,$!d' -e ':a' -e '/^\n*$/{$d;N;ba}' > "$file"
          if [ -s "$file" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Publish archives to the release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
          NOTES_FOUND: ${{ steps.notes.outputs.found }}
          NOTES_FILE: ${{ steps.notes.outputs.file }}
        run: |
          set -euo pipefail
          if [ "$NOTES_FOUND" = true ]; then
            note_args=(--notes-file "$NOTES_FILE")
          else
            echo "::warning::No CHANGELOG entry for $VERSION; using generated notes."
            note_args=(--generate-notes)
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            # Release already exists: refresh notes only when the changelog has them.
            [ "$NOTES_FOUND" = true ] && gh release edit "$VERSION" --notes-file "$NOTES_FILE"
          else
            gh release create "$VERSION" --title "$VERSION" "${note_args[@]}"
          fi
          gh release upload "$VERSION" dist/* --clobber
